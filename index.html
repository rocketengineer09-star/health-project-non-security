<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건강 정보 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --danger: #f85149;
    --warn: #d29922;
    --green: #3fb950;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(0,212,170,.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    animation: fadeUp .5s ease;
  }

  .logo {
    text-align: center;
  }
  .logo .icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 12px;
    box-shadow: 0 0 30px rgba(0,212,170,.3);
  }
  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -.5px;
  }
  .logo p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,.12);
  }

  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .1s;
    letter-spacing: .3px;
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }

  /* ===== POPUP ===== */
  .popup-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .popup-overlay.show { display: flex; }
  .popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    max-width: 320px;
    width: 90%;
    text-align: center;
    animation: popIn .25s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .popup .popup-icon { font-size: 36px; margin-bottom: 12px; }
  .popup h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .popup p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
  .popup-btn {
    margin-top: 20px;
    padding: 10px 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s;
  }
  .popup-btn:hover { background: var(--border); }

  /* ===== HEALTH DASHBOARD ===== */
  #health-screen {
    display: none;
    width: 100%;
    max-width: 700px;
    padding: 20px;
    animation: fadeUp .4s ease;
    max-height: 100vh;
    overflow-y: auto;
  }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .dash-header .user-info h2 {
    font-size: 22px;
    font-weight: 700;
  }
  .dash-header .user-info p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 8px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .metric-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-color, var(--accent));
  }
  .metric-card .metric-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 8px;
  }
  .metric-card .metric-icon { font-size: 20px; margin-bottom: 6px; }
  .metric-card .metric-value {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }
  .metric-card .metric-unit {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .bmi-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .bmi-bar-wrap h4 {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 16px;
  }
  .bmi-bar-track {
    height: 10px;
    border-radius: 99px;
    background: linear-gradient(90deg, #0099ff 0%, #00d4aa 30%, #3fb950 50%, #d29922 70%, #f85149 100%);
    position: relative;
    margin-bottom: 8px;
  }
  .bmi-pointer {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--bg);
    box-shadow: 0 0 8px rgba(255,255,255,.5);
    transition: left .6s cubic-bezier(.34,1.56,.64,1);
  }
  .bmi-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .bmi-value-label {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .bmi-status {
    text-align: center;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 99px;
    display: inline-block;
    margin: 0 auto 12px;
  }
  .bmi-center { text-align: center; }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.9); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo">
    <div class="icon">🩺</div>
    <h1>건강 정보 조회 시스템</h1>
    <p>이름과 비밀번호를 입력하여 건강 정보를 확인하세요</p>
  </div>
  <div class="card">
    <div class="field">
      <label>이름</label>
      <input id="input-name" type="text" placeholder="홍길동" autocomplete="off">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input id="input-pw" type="password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="doLogin()">조회하기</button>
  </div>
</div>

<!-- HEALTH DASHBOARD -->
<div id="health-screen">
  <div class="dash-header">
    <div class="user-info">
      <h2 id="dash-name"></h2>
      <p id="dash-age"></p>
    </div>
    <button class="logout-btn" onclick="doLogout()">← 로그아웃</button>
  </div>

  <div class="metrics-grid">
    <div class="metric-card" style="--card-color:#f85149">
      <div class="metric-icon">❤️</div>
      <div class="metric-label">심박수</div>
      <div class="metric-value" id="v-hr"></div>
      <div class="metric-unit">bpm</div>
    </div>
    <div class="metric-card" style="--card-color:#d29922">
      <div class="metric-icon">🩸</div>
      <div class="metric-label">혈압</div>
      <div class="metric-value" style="font-size:20px" id="v-bp"></div>
      <div class="metric-unit">mmHg</div>
    </div>
    <div class="metric-card" style="--card-color:#0099ff">
      <div class="metric-icon">🍬</div>
      <div class="metric-label">혈당량</div>
      <div class="metric-value" id="v-bs"></div>
      <div class="metric-unit">mg/dL</div>
    </div>
    <div class="metric-card" style="--card-color:#3fb950">
      <div class="metric-icon">📏</div>
      <div class="metric-label">키</div>
      <div class="metric-value" id="v-ht"></div>
      <div class="metric-unit">cm</div>
    </div>
    <div class="metric-card" style="--card-color:#00d4aa">
      <div class="metric-icon">⚖️</div>
      <div class="metric-label">몸무게</div>
      <div class="metric-value" id="v-wt"></div>
      <div class="metric-unit">kg</div>
    </div>
  </div>

  <div class="bmi-bar-wrap">
    <h4>BMI 지수</h4>
    <div class="bmi-center">
      <div class="bmi-value-label" id="v-bmi"></div>
      <div><span class="bmi-status" id="v-bmi-status"></span></div>
    </div>
    <div class="bmi-bar-track" style="margin-top:14px">
      <div class="bmi-pointer" id="bmi-pointer"></div>
    </div>
    <div class="bmi-labels">
      <span>저체중<br>&lt;18.5</span>
      <span>정상<br>18.5–22.9</span>
      <span>과체중<br>23–24.9</span>
      <span>비만<br>≥25</span>
    </div>
  </div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">
  <div class="popup">
    <div class="popup-icon" id="popup-icon"></div>
    <h3 id="popup-title"></h3>
    <p id="popup-msg"></p>
    <button class="popup-btn" onclick="closePopup()">확인</button>
  </div>
</div>

  {name:"유서윤", pw:"Ce5#Xt0L", hr:64, bp:"106/65", bs:79, ht:159, wt:47, bmi:18.6, age:18},
];

function doLogin() {
  const name = document.getElementById('input-name').value.trim();
  const pw   = document.getElementById('input-pw').value;

  const user = users.find(u => u.name === name);
  if (!user) {
    showPopup('⚠️', '사용자를 찾을 수 없습니다', `'${name}'(으)로 등록된 사용자가 없습니다.\n이름을 다시 확인해 주세요.`);
    return;
  }
  if (user.pw !== pw) {
    showPopup('🔒', '비밀번호가 다릅니다', '입력하신 비밀번호가 일치하지 않습니다.\n다시 시도해 주세요.');
    return;
  }
  showDashboard(user);
}

function showDashboard(u) {
  document.getElementById('login-screen').style.display = 'none';
  const hs = document.getElementById('health-screen');
  hs.style.display = 'block';

  document.getElementById('dash-name').textContent = u.name + ' 님';
  document.getElementById('dash-age').textContent = `나이: ${u.age}세`;
  document.getElementById('v-hr').textContent = u.hr;
  document.getElementById('v-bp').textContent = u.bp;
  document.getElementById('v-bs').textContent = u.bs;
  document.getElementById('v-ht').textContent = u.ht;
  document.getElementById('v-wt').textContent = u.wt;
  document.getElementById('v-bmi').textContent = u.bmi;

  // BMI status
  let statusText, statusColor;
  if (u.bmi < 18.5)      { statusText='저체중'; statusColor='#0099ff'; }
  else if (u.bmi < 23)   { statusText='정상';   statusColor='#3fb950'; }
  else if (u.bmi < 25)   { statusText='과체중'; statusColor='#d29922'; }
  else                   { statusText='비만';   statusColor='#f85149'; }

  const badge = document.getElementById('v-bmi-status');
  badge.textContent = statusText;
  badge.style.background = statusColor + '22';
  badge.style.color = statusColor;
  badge.style.border = `1px solid ${statusColor}55`;

  // BMI pointer: map 10–35 → 0%–100%
  const pct = Math.min(100, Math.max(0, (u.bmi - 10) / 25 * 100));
  setTimeout(() => {
    document.getElementById('bmi-pointer').style.left = pct + '%';
  }, 100);
}

function doLogout() {
  document.getElementById('health-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('input-name').value = '';
  document.getElementById('input-pw').value = '';
}

function showPopup(icon, title, msg) {
  document.getElementById('popup-icon').textContent = icon;
  document.getElementById('popup-title').textContent = title;
  document.getElementById('popup-msg').textContent = msg;
  document.getElementById('popup').classList.add('show');
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
